# Vera's seed config (config-as-code — copied to the live config ONCE on first
# boot via PROTOAGENT_SEED_CONFIG; operator edits persist in the config volume).
#
# Headless QA reviewer (ADR 0078 Phase D, PROMOTED stage — see pr_reviewer below;
# shadow remains the shipped default for fresh installs). Secrets NEVER live here:
# OPENAI_API_KEY / A2A_AUTH_TOKEN / GH_TOKEN / PR_REVIEWER_WEBHOOK_SECRET all
# arrive via the stack env (Infisical). `model.api_base` is protoAgent's
# in-container default (http://gateway:4000/v1) — not pinned here.

agent:
  name: vera

# A2A agent card identity (protoAgent #570): `name` comes from AGENT_NAME (set in
# the compose), but `description` + `skills` are config-driven here — without them
# the card falls back to the stock template ("protoAgent template… replace this",
# a placeholder `chat` skill). pr-reviewer ships no `register_a2a_skill`, so we
# declare Vera's dispatchable capability ourselves. Skill *behaviour* lives in
# SOUL.md (already covers ad-hoc PR review); this only advertises it to callers.
a2a:
  description: >-
    Vera — the protoLabs fleet's QA engineer. Reviews pull requests through an
    adversarial panel (four LLM finder angles + the protoPatch structural engine)
    with independent verification, and returns formal PASS/WARN/FAIL verdicts.
    A promoted formal gate on her managed repos — a FAIL blocks against terminal
    CI, and approve-on-green promotion is hers; never reviews her own work.
  skills:
    - id: pr_review
      name: Review a pull request
      description: >-
        Review a GitHub PR through the adversarial panel and the protoPatch
        structural engine, verify the findings, and return a formal
        PASS / WARN / FAIL verdict with the findings that drove it.
      tags: [code-review, pull-request, qa, verdict]
      examples:
        - "review https://github.com/protoLabsAI/protoAgent/pull/64"
        - "what's your verdict on PR #42 in protoLabsAI/qaEngineer?"

plugins:
  enabled: [workflows, github, pr-reviewer]

# The verdict surface (github-plugin). Write is required to post reviews; the
# CI-terminal + self-review guards live INSIDE the tools. gh auth = GH_TOKEN env
# (the protoReview identity — must NOT author PRs in the managed repos).
github:
  write: true
  default_repo: ""
  repos: []

# The reviewer machinery. PROMOTED (earned via the three-way eval): a FAIL posts
# as REQUEST_CHANGES against terminal CI, and approve-on-green promotion is hers
# — she is the sole promoter on these repos, so nothing else may promote them
# (two promoters racing is how double-merges happen). Shadow stays the shipped
# default for fresh installs (see protoagent.bundle.yaml); this is Vera's OWN
# deployment. `repos` is the managed allowlist — the webhook/sweep scope — and is
# operator state: it lives in the live config volume, NOT here. Set it there or
# via POST /api/config.
pr_reviewer:
  repos: []
  shadow_mode: false
  promotion_owner: true
  default_repo: ""
