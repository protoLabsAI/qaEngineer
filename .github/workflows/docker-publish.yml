name: Publish Docker image to GHCR

# Rolling image build on every push to main: pushes
# `ghcr.io/protolabsai/vera:latest` (what Watchtower polls) plus a pinned
# `sha-<short>` for rollbacks. All baked members are PUBLIC repos pinned at
# release tags in the Dockerfile — no build secrets.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: protolabsai/vera

jobs:
  build-and-push:
    runs-on: ${{ vars.NSC_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # The bundle manifest is the single source of truth for member pins — derive
      # the bake refs from it so the Dockerfile ARG defaults can never drift
      # (they stay as documentation/local-build fallbacks).
      - name: Member refs from the bundle manifest
        id: refs
        run: |
          gh_ref=$(sed -n 's/.*github-plugin, *ref: *\(v[0-9.]*\).*/\1/p' protoagent.bundle.yaml)
          pr_ref=$(sed -n 's/.*pr-reviewer-plugin, *ref: *\(v[0-9.]*\).*/\1/p' protoagent.bundle.yaml)
          test -n "$gh_ref" && test -n "$pr_ref"  # fail the build if parsing breaks
          echo "github=$gh_ref" >> "$GITHUB_OUTPUT"
          echo "pr_reviewer=$pr_ref" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          build-args: |
            GITHUB_PLUGIN_REF=${{ steps.refs.outputs.github }}
            PR_REVIEWER_PLUGIN_REF=${{ steps.refs.outputs.pr_reviewer }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
